deepseek:
  enabled: true
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com/v1
  model: deepseek-v4-flash
  timeout_seconds: 60
  max_retries: 2

runtime:
  mode: local
  temp_dir: ./.runtime
  output_dir: ./outputs

detection:
  ai_fallback_enabled: true
  min_confidence: 0.75

ai:
  enabled: true
  levels:
    platform_detection: true
    keyword_extraction: true
    sheet_type_detection: true
    column_mapping: true
    date_inference: true
    category_review: true
    numeric_anomaly_review: true
    top10_review: true
    merge_consistency_review: true
    error_fix_suggestion: true
    final_summary: true
  thresholds:
    platform_detection: 0.75
    keyword_extraction: 0.75
    column_mapping: 0.80
    date_inference: 0.85
    category_review: 0.70
    numeric_auto_apply: 0.90
    merge_consistency_review: 0.75
  batching:
    category_batch_size: 15
    numeric_anomaly_sample_size: 20
    timeout_seconds: 60

output:
  zip_results: true
  timestamp_output_dir: true
  excel_freeze_header: true
  excel_autofilter: true
